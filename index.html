<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Posto Barra Mansa App</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1E5AA8;
            --amarelo: #F2C200;
            --laranja: #F25C05;
            --branco: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Impede rolagem pra parecer app */
            background-color: var(--azul);
            font-family: 'Montserrat', sans-serif;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER ESTILO APP */
        .header {
            padding: 40px 20px 20px;
            background: linear-gradient(180deg, rgba(30,90,168,1) 0%, rgba(21,65,122,1) 100%);
            text-align: center;
            border-bottom: 4px solid var(--amarelo);
        }

        .header h1 {
            color: var(--branco);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header h1 span { color: var(--amarelo); }

        /* ÁREA DO MAPA (CORPO DO APP) */
        .content {
            flex: 1; /* Ocupa todo o espaço restante */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* CARD FLUTUANTE DE AÇÃO */
        .action-card {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .address-text {
            color: var(--azul);
            font-size: 0.8rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .btn-app {
            background-color: var(--laranja);
            color: var(--branco);
            display: block;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #b34404;
            transition: transform 0.1s;
        }

        .btn-app:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b34404;
        }

        /* ESTILO DA STATUS BAR (SIMULAÇÃO) */
        .status-bar {
            height: 25px;
            background: var(--azul);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>Posto <span>Barra Mansa</span></h1>
        </header>

        <main class="content">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3683.023450970347!2d-44.1953!3d-22.5404!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9ea26330555555%3A0x123456789!2zUm9kLiBQcmVzLiBEdXRyYSwgMjc2IC0gQmFycmEgTWFuc2EsIFJK!5e0!3m2!1spt-BR!2sbr!4v1713300000000" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>

            <div class="action-card">
                <p class="address-text">📍 Rod. Pres. Dutra, 276 - Barra Mansa, RJ</p>
                <a href="https://www.google.com/maps/dir/?api=1&destination=-22.5404,-44.1953" target="_blank" class="btn-app">
                    INICIAR ROTA NO GPS
                </a>
            </div>
        </main>
    </div>

</body>
</html>
