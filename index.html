<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posto Barra Mansa | Rota Direta</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-ipiranga: #1E5AA8;
            --amarelo-ipiranga: #F2C200;
            --laranja-ipiranga: #F25C05;
            --branco: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--azul-ipiranga);
            color: var(--branco);
            overflow-x: hidden;
        }

        /* SESSÃO 1: HEADLINE E CTA */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at top, #2a72d4 0%, var(--azul-ipiranga) 100%);
            border-bottom: 8px solid var(--amarelo-ipiranga);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 20px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .hero h1 span {
            color: var(--amarelo-ipiranga);
        }

        .btn-rota {
            background-color: var(--laranja-ipiranga);
            color: var(--branco);
            padding: 20px 50px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 8px 0 #b34404; /* Efeito 3D */
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-rota:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b34404;
        }

        /* SESSÃO 2: MAPA FULLSCREEN */
        .map-section {
            height: 40vh;
            width: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .address-bar {
            background: var(--amarelo-ipiranga);
            color: var(--azul-ipiranga);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Posto <br><span>Barra Mansa</span></h1>
        <p style="margin-bottom: 30px; font-weight: 400; opacity: 0.9;">Sua parada de confiança na Via Dutra</p>
        <a href="https://www.google.com/maps/dir/?api=1&destination=-22.5458,-44.1614" target="_blank" class="btn-rota">
            ABRIR GPS AGORA
        </a>
    </section>

    <div class="address-bar">
        📍 Rod. Pres. Dutra, 276 - Getúlio Vargas, Barra Mansa - RJ
    </div>

    <section class="map-section">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3683.336429381523!2d-44.16401062385906!3d-22.54780517951057!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9ea27382f64185%3A0x6a1f8939c36d773c!2sRod.%20Pres.%20Dutra%2C%20276%20-%20Get%C3%BAlio%20Vargas%2C%20Barra%20Mansa%20-%20RJ%2C%2027350-420!5e0!3m2!1spt-BR!2sbr!4v1713310000000!5m2!1spt-BR!2sbr" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </section>

</body>
</html>
